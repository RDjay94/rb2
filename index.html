<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RajaBaji 2.0 — Wireframe Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0A0A0A; color: white; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

  /* ===================== GATE ===================== */
  #gate { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(1200px 600px at 50% 30%, rgba(157,225,52,0.12), transparent 60%), #0A0A0A; display: grid; place-items: center; transition: opacity .4s ease; }
  #gate.unlocked { opacity: 0; pointer-events: none; }
  #gate .grid-bg-mask { position: absolute; inset: 0; background-image: linear-gradient(rgba(157,225,52,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(157,225,52,0.05) 1px, transparent 1px); background-size: 24px 24px; opacity: 0.5; }
  #gate .gate-card { position: relative; width: 380px; padding: 36px 32px; border-radius: 24px; background: #101010; border: 1px solid #2A2A2A; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(157,225,52,0.08); }
  #gate .gate-logo { width: 64px; height: 64px; border-radius: 18px; background: #9DE134; display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-weight: 900; color: #0A0A0A; font-size: 34px; margin: 0 auto 18px; box-shadow: 0 0 32px rgba(157,225,52,0.4); }
  #gate h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 22px; text-align: center; margin: 0 0 6px; color: white; }
  #gate .sub { text-align: center; font-size: 12px; color: #71717A; margin-bottom: 24px; }
  #gate .label { display: block; font-size: 10px; color: #71717A; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  #gate input { width: 100%; padding: 12px 14px; background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 12px; color: white; font-size: 14px; outline: none; transition: border-color .2s; }
  #gate input:focus { border-color: #9DE134; }
  #gate input.shake { animation: shake-x .35s ease-in-out; border-color: #ef4444; }
  @keyframes shake-x { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #gate button { width: 100%; padding: 14px; margin-top: 14px; background: #9DE134; color: #0A0A0A; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; transition: background .15s; }
  #gate button:hover { background: #B5F04D; }
  #gate .err { color: #ef4444; font-size: 11px; margin-top: 8px; text-align: center; min-height: 16px; }
  #gate .footer { text-align: center; font-size: 10px; color: #52525B; margin-top: 18px; }

  /* ===================== SHELL ===================== */
  #shell { display: flex; flex-direction: column; height: 100vh; }

  .shell-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: rgba(16,16,16,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #2A2A2A; flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo { width: 38px; height: 38px; border-radius: 12px; background: #9DE134; display: grid; place-items: center; font-family: 'Space Grotesk'; font-weight: 900; color: #0A0A0A; font-size: 20px; }
  .brand-text { font-family: 'Space Grotesk'; font-weight: 800; font-size: 18px; }
  .brand-text .accent { color: #9DE134; }
  .brand-sub { font-size: 11px; color: #71717A; }

  /* Version toggle — segmented control */
  .v-toggle { display: flex; gap: 4px; padding: 4px; background: #1C1C1C; border: 1px solid #2A2A2A; border-radius: 12px; }
  .v-toggle button { padding: 8px 18px; border: none; background: transparent; color: #A1A1AA; font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 8px; transition: all .2s; font-family: inherit; }
  .v-toggle button .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #333; color: #999; font-weight: 800; letter-spacing: 0.5px; }
  .v-toggle button:hover { color: white; background: #2A2A2A; }
  .v-toggle button.active { background: #9DE134; color: #0A0A0A; }
  .v-toggle button.active .badge { background: #0A0A0A; color: #9DE134; }

  .shell-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #71717A; }
  .shell-meta a { color: #9DE134; text-decoration: none; padding: 6px 10px; border-radius: 8px; background: #1C1C1C; border: 1px solid #2A2A2A; }
  .shell-meta a:hover { border-color: #9DE134; }

  .frame-wrap { flex: 1; min-height: 0; position: relative; }
  #version-frame { width: 100%; height: 100%; border: 0; display: block; background: #0A0A0A; }

  .switching { position: absolute; inset: 0; background: #0A0A0A; display: grid; place-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .switching.active { opacity: 1; pointer-events: auto; }
  .switching .loader { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .switching .loader .ring { width: 48px; height: 48px; border: 3px solid #2A2A2A; border-top-color: #9DE134; border-radius: 50%; animation: ring-spin 0.8s linear infinite; }
  @keyframes ring-spin { to { transform: rotate(360deg); } }
  .switching .loader .label { color: #9DE134; font-size: 12px; font-weight: 700; letter-spacing: 2px; }
</style>
</head>
<body>

<!-- ============================== PASSWORD GATE ============================== -->
<div id="gate">
  <div class="grid-bg-mask"></div>
  <form class="gate-card" onsubmit="return checkGate(event)">
    <div class="gate-logo">R</div>
    <h1>RajaBaji 2.0 · Wireframe</h1>
    <div class="sub">Internal prototype · ask RD Jay for password</div>
    <label class="label">Access password</label>
    <input id="gate-input" type="password" placeholder="Enter password" autocomplete="off" autofocus>
    <div class="err" id="gate-err">&nbsp;</div>
    <button type="submit">Unlock prototype →</button>
    <div class="footer">d1ads · RajaBaji revamp 2026</div>
  </form>
</div>

<!-- ============================== SHELL ============================== -->
<div id="shell" style="display:none;">
  <header class="shell-header">
    <div class="brand">
      <div class="brand-logo">R</div>
      <div>
        <div class="brand-text">RajaBaji 2.0 <span class="accent">·</span> Wireframe Hub</div>
        <div class="brand-sub">Toggle between versions · iframe-embedded · same auth session</div>
      </div>
    </div>
    <div class="v-toggle" id="v-toggle">
      <button data-v="v1"><span>V1</span><span class="badge">FROZEN</span></button>
      <button data-v="v2" class="active"><span>V2</span><span class="badge">3D</span></button>
    </div>
    <div class="shell-meta">
      <a href="v1/" target="_blank" title="Open V1 in new tab">V1 ↗</a>
      <a href="v2/" target="_blank" title="Open V2 in new tab">V2 ↗</a>
    </div>
  </header>
  <div class="frame-wrap">
    <iframe id="version-frame" src="v2/index.html" title="RajaBaji wireframe"></iframe>
    <div class="switching" id="switching">
      <div class="loader">
        <div class="ring"></div>
        <div class="label" id="switching-label">LOADING V2</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== GATE LOGIC =====================
(function(){
  const STORAGE_KEY = 'rb2-unlocked-v1';
  function unlock(){
    sessionStorage.setItem(STORAGE_KEY, '1');
    const g = document.getElementById('gate');
    g.classList.add('unlocked');
    setTimeout(()=>{ g.style.display = 'none'; document.getElementById('shell').style.display = 'flex'; }, 400);
  }
  window.checkGate = function(e){
    if (e) e.preventDefault();
    const v = document.getElementById('gate-input').value;
    const target = String.fromCharCode(65,97,97,97,49,49,49,49);
    if (v === target) { unlock(); }
    else {
      const inp = document.getElementById('gate-input');
      const err = document.getElementById('gate-err');
      inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
      err.textContent = 'Wrong password. Try again.';
      inp.select();
    }
    return false;
  };
  if (sessionStorage.getItem(STORAGE_KEY) === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
  }
})();

// ===================== VERSION SWITCHER =====================
(function(){
  const toggle = document.getElementById('v-toggle');
  const frame = document.getElementById('version-frame');
  const overlay = document.getElementById('switching');
  const label = document.getElementById('switching-label');
  const SRC = { v1: 'v1/index.html', v2: 'v2/index.html' };
  // Initial active button — try restoring from URL hash or default to v2
  const initialV = (location.hash.replace('#','') === 'v1') ? 'v1' : 'v2';
  Array.from(toggle.children).forEach(b => b.classList.toggle('active', b.dataset.v === initialV));
  frame.src = SRC[initialV];
  toggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const v = btn.dataset.v;
    if (frame.src.endsWith(SRC[v])) return;
    Array.from(toggle.children).forEach(b => b.classList.toggle('active', b === btn));
    label.textContent = 'LOADING ' + v.toUpperCase();
    overlay.classList.add('active');
    location.hash = v;
    setTimeout(() => {
      frame.src = SRC[v];
    }, 200);
  });
  frame.addEventListener('load', () => {
    setTimeout(() => overlay.classList.remove('active'), 300);
  });
})();
</script>

</body>
</html>
